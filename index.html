<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Product Assistant (Universal)</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #fdf2f8 0%, #f3e8ff 50%, #e0f2fe 100%);
            background-attachment: fixed;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #2d2d3a; border-radius: 0 8px 8px 0; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6b7280; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .input-pastel {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        .input-pastel:focus {
            background-color: #fff;
            border-color: #c084fc;
            box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.2);
            outline: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICON COMPONENTS ---
        const PackageIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16.5 9.4-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        );
        const SparklesIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 5H1"/><path d="M19 19v4"/><path d="M23 21h-8"/></svg>
        );
        const Trash2Icon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        );
        const PlusIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        );
        const CopyIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        );
        const CheckCircleIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        );
        const KeyIcon = ({ size = 24, className = "" }) => (
             <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
        );
        const FileTextIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        );
        const TagIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>
        );
        const VideoIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
        );

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || 'AIzaSyCe1GTXxZM3Wum9y51xE6Gmnj6LkEDZVjA');
            const [isKeyVisible, setIsKeyVisible] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [aiInput, setAiInput] = useState('');
            const [rawName, setRawName] = useState('');
            
            // State Data Produk
            const [identities, setIdentities] = useState([
                { label: 'Nama Produk', value: '' },
                { label: 'Merek', value: '' },
                { label: 'ID Produk', value: '' },
                { label: 'Warna', value: '' }
            ]);

            const [specs, setSpecs] = useState([{ title: '', desc: '' }]);
            
            const [packaging, setPackaging] = useState([
                { label: 'Satuan Jual', value: 'Per Pcs' },
                { label: 'Kondisi', value: 'Baru' },
                { label: 'Grosir', value: '' },
                { label: 'Catatan', value: 'Cover/kemasan/motif sesuai stok yang tersedia' }
            ]);
            
            const [usages, setUsages] = useState([{ title: '', desc: '' }]);
            const [nameRecommendations, setNameRecommendations] = useState([
                { value: '', target: '100' },
                { value: '', target: '150' },
                { value: '', target: '200' },
                { value: '', target: '255' }
            ]);
            const [videoCaption, setVideoCaption] = useState('');

            const [generatedText, setGeneratedText] = useState('');
            const [copied, setCopied] = useState(false);

            const saveApiKey = (e) => {
                const key = e.target.value;
                setApiKey(key);
                localStorage.setItem('gemini_api_key', key);
            };

            // --- FUNGSI FETCH WITH RETRY (Exponential Backoff) ---
            const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
                try {
                    const response = await fetch(url, options);

                    if (!response.ok) {
                        // Retry jika Rate Limit (429) atau Server Error (500+)
                        if (response.status === 429 || response.status >= 500) {
                            if (retries > 0) {
                                await new Promise(resolve => setTimeout(resolve, delay));
                                return fetchWithRetry(url, options, retries - 1, delay * 2);
                            }
                        }
                        // Jika bukan error yang bisa di-retry atau retry habis
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `API Error: ${response.status}`);
                    }

                    return response;
                } catch (error) {
                    // Retry jika network error
                    if (retries > 0) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        return fetchWithRetry(url, options, retries - 1, delay * 2);
                    }
                    throw error;
                }
            };

            // --- FUNGSI GENERATE DESKRIPSI (TEKS) ---
            const generateDescription = async () => {
                if (!apiKey) return alert("Masukkan API Key Gemini!");
                if (!aiInput) return alert("Masukkan nama produk!");

                setIsLoading(true);
                setRawName(aiInput); 

                try {
                    const prompt = `
                    Kamu adalah asisten e-commerce profesional. Tugasmu adalah membuat deskripsi produk lengkap dalam format JSON berdasarkan nama produk ini: "${aiInput}".
                    
                    Analisis nama produk tersebut, tebak spesifikasi, kegunaan, dan detailnya dengan cerdas.
                    
                    TAMBAHAN PENTING: 
                    1. Buatkan 4 rekomendasi "Nama Produk / Judul Listing" yang SEO-friendly dengan variasi panjang karakter:
                       - Variasi 1: Sekitar 100 karakter.
                       - Variasi 2: Sekitar 150 karakter.
                       - Variasi 3: Sekitar 200 karakter.
                       - Variasi 4: Maksimal 255 karakter (Sangat lengkap dengan kata kunci).
                    2. Buatkan "Caption Shopee Video" yang menarik & persuasif. PENTING: TOTAL panjang caption BESERTA hashtag HARUS DI BAWAH 150 karakter. Gunakan 2-3 hashtag.
                    
                    Keluarkan HANYA JSON (tanpa markdown block) dengan struktur persis seperti ini:
                    {
                        "identities": [
                            {"label": "Nama Produk", "value": "..."},
                            {"label": "Merek", "value": "..."},
                            {"label": "Fitur/Varian Penting", "value": "..."}
                        ],
                        "specs": [
                            {"title": "Fitur Teknis 1", "desc": "Penjelasan..."},
                            {"title": "Fitur Teknis 2", "desc": "Penjelasan..."}
                        ],
                        "packaging": [
                            {"label": "Satuan Jual", "value": "..."},
                            {"label": "Kondisi", "value": "Baru"},
                            {"label": "Catatan", "value": "Cover/kemasan/motif sesuai stok yang tersedia"}
                        ],
                        "usages": [
                            {"title": "Kegunaan 1", "desc": "Penjelasan..."},
                            {"title": "Kegunaan 2", "desc": "Penjelasan..."}
                        ],
                        "name_recommendations": [
                            "Judul variasi 100 char...", 
                            "Judul variasi 150 char...",
                            "Judul variasi 200 char...",
                            "Judul variasi 255 char..."
                        ],
                        "shopee_video_caption": "Teks caption video di sini... #hashtag"
                    }
                    `;

                    // Menggunakan versi stabil 'gemini-2.5-flash'
                    const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    
                    let content = data.candidates[0].content.parts[0].text;
                    content = content.replace(/```json/g, '').replace(/```/g, '').trim();
                    const result = JSON.parse(content);

                    if (result.identities) setIdentities(result.identities);
                    if (result.specs) setSpecs(result.specs);
                    if (result.packaging) setPackaging(result.packaging);
                    if (result.usages) setUsages(result.usages);
                    if (result.shopee_video_caption) setVideoCaption(result.shopee_video_caption);
                    
                    if (result.name_recommendations && Array.isArray(result.name_recommendations)) {
                        const targets = ['100', '150', '200', '255'];
                        const recs = result.name_recommendations.map((name, index) => ({ 
                            value: name,
                            target: targets[index] || 'Max'
                        }));
                        setNameRecommendations(recs);
                    }

                } catch (error) {
                    console.error("Error generating text:", error);
                    if (error.message.includes("429")) {
                        alert("Sistem sedang sibuk (Quota Limit). Kami sudah mencoba beberapa kali. Silakan tunggu sebentar lalu coba lagi.");
                    } else {
                        alert("Gagal generate deskripsi: " + error.message);
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            // --- PREVIEW GENERATOR ---
            useEffect(() => {
                let text = `Informasi produk : ${rawName}\n\n`;
                
                text += `1. Identitas Produk\n`;
                identities.forEach(item => {
                    if(item.label && item.value) text += `* ${item.label}: ${item.value}\n`;
                });
                
                text += `\n2. Spesifikasi Teknis\n`;
                specs.forEach(spec => {
                    if(spec.title) text += `* ${spec.title}: ${spec.desc}\n`;
                });

                text += `\n3. Informasi Kemasan & Satuan\n`;
                packaging.forEach(pack => {
                    if(pack.label && pack.value) text += `* ${pack.label}: ${pack.value}\n`;
                });

                text += `\n4. Kegunaan Utama\n`;
                usages.forEach(use => {
                    if(use.title) text += `* ${use.title}: ${use.desc}\n`;
                });

                // REKOMENDASI NAMA & CAPTION VIDEO TIDAK DITAMPILKAN DI PREVIEW (SESUAI REQUEST)

                // TAMBAHAN FOOTER OTOMATIS
                text += `\n\nCatatan: Cover/kemasan/motif sesuai stok yang tersedia.`;

                setGeneratedText(text);
            }, [rawName, identities, specs, usages, packaging]); 

            // --- HANDLERS GENERIC ---
            const updateItem = (setter, list, index, field, value) => {
                const newList = [...list];
                newList[index][field] = value;
                setter(newList);
            };
            const addItem = (setter, list, template) => setter([...list, template]);
            const removeItem = (setter, list, index) => setter(list.filter((_, i) => i !== index));

            const copyToClipboard = () => {
                navigator.clipboard.writeText(generatedText);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const resetForm = () => {
                setRawName('');
                setIdentities([ { label: 'Nama Produk', value: '' }, { label: 'Merek', value: '' } ]);
                setSpecs([{ title: '', desc: '' }]);
                setPackaging([
                    { label: 'Satuan Jual', value: 'Per Pcs' },
                    { label: 'Kondisi', value: 'Baru' },
                    { label: 'Grosir', value: '' },
                    { label: 'Catatan', value: 'Cover/kemasan/motif sesuai stok yang tersedia' }
                ]);
                setUsages([{ title: '', desc: '' }]);
                setNameRecommendations([
                    { value: '', target: '100' },
                    { value: '', target: '150' },
                    { value: '', target: '200' },
                    { value: '', target: '255' }
                ]);
                setVideoCaption('');
                setAiInput('');
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto font-sans text-slate-800">
                    <header className="mb-10 text-center">
                        <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center gap-3 drop-shadow-sm">
                            <PackageIcon size={40} className="text-purple-500" />
                            AI Product Assistant
                        </h1>
                        <p className="text-slate-500 mt-2 text-lg font-medium">Buat deskripsi teks SEO profesional dalam sekejap ✨</p>
                    </header>

                    {/* API KEY SECTION */}
                    <div className="glass-card p-4 rounded-2xl mb-8 max-w-2xl mx-auto border border-white/50 shadow-sm">
                        <button 
                            onClick={() => setIsKeyVisible(!isKeyVisible)}
                            className="flex items-center text-sm font-semibold text-slate-600 hover:text-purple-600 w-full justify-between transition-colors"
                        >
                            <span className="flex items-center gap-2"><KeyIcon size={18}/> Pengaturan API Key (Gemini)</span>
                            <span>{isKeyVisible ? 'Tutup ▲' : 'Buka ▼'}</span>
                        </button>
                        
                        {isKeyVisible && (
                            <div className="mt-4 animate-fade-in">
                                <input 
                                    type="password" 
                                    value={apiKey}
                                    onChange={saveApiKey}
                                    placeholder="Tempel Google Gemini API Key di sini..."
                                    className="w-full p-3 input-pastel rounded-xl text-sm"
                                />
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        
                        {/* LEFT COLUMN: INPUT */}
                        <div className="space-y-8">
                            
                            {/* INPUT & GENERATOR BUTTONS */}
                            <div className="glass-card p-8 rounded-3xl shadow-lg border border-white/60 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-purple-200 rounded-full blur-3xl opacity-20 -mr-10 -mt-10"></div>
                                <label className="block text-xl font-bold text-slate-700 mb-3 flex items-center gap-2">
                                    <SparklesIcon className="text-yellow-400" size={24}/>
                                    1. Masukkan Nama Produk
                                </label>
                                <div className="flex flex-col gap-3">
                                    <input 
                                        type="text" 
                                        value={aiInput}
                                        onChange={(e) => setAiInput(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && generateDescription()}
                                        placeholder="Misal: Indomie Goreng, Baju Batik, Laptop Asus..." 
                                        className="w-full p-4 input-pastel rounded-2xl shadow-inner text-base"
                                    />
                                    
                                    <button 
                                        onClick={generateDescription}
                                        disabled={isLoading}
                                        className="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all shadow-md disabled:opacity-70 disabled:cursor-not-allowed"
                                    >
                                        {isLoading ? <div className="loader"></div> : <><FileTextIcon size={18}/> Generate Teks SEO</>}
                                    </button>
                                </div>

                                {/* REKOMENDASI NAMA (SEO) - FULL WIDTH TEXTAREA */}
                                <div className="mt-6 pt-6 border-t border-purple-100">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-sm font-bold text-purple-600 uppercase tracking-wide flex items-center gap-2">
                                            <TagIcon size={16}/> 
                                            Rekomendasi Judul (SEO)
                                        </span>
                                        <button onClick={() => addItem(setNameRecommendations, nameRecommendations, { value: '', target: 'Custom' })} className="bg-white text-purple-600 w-8 h-8 rounded-full flex items-center justify-center hover:bg-purple-100 transition-colors shadow-sm"><PlusIcon size={18}/></button>
                                    </div>
                                    <div className="space-y-4">
                                        {nameRecommendations.map((item, i) => (
                                            <div key={i} className="flex gap-2 group relative">
                                                <div className="w-full relative">
                                                    <div className="absolute -top-2.5 left-2 bg-purple-100 text-purple-700 text-[10px] px-2 py-0.5 rounded-full font-semibold z-10 border border-purple-200 shadow-sm">
                                                        Target: ~{item.target} Karakter
                                                    </div>
                                                    <textarea 
                                                        value={item.value} 
                                                        onChange={(e)=>updateItem(setNameRecommendations, nameRecommendations, i, 'value', e.target.value)} 
                                                        placeholder="Judul produk..." 
                                                        className="input-pastel p-3 pt-4 rounded-xl text-sm w-full resize-none h-auto min-h-[60px] font-medium leading-relaxed"
                                                        rows={3}
                                                    />
                                                    <div className={`absolute bottom-2 right-2 text-[10px] px-1.5 rounded bg-white/80 font-bold shadow-sm border ${
                                                        item.value.length > parseInt(item.target) ? 'text-red-500 border-red-200' : 'text-slate-400 border-slate-200'
                                                    }`}>
                                                        {item.value.length} / {item.target}
                                                    </div>
                                                </div>
                                                <button onClick={()=>removeItem(setNameRecommendations, nameRecommendations, i)} className="text-slate-300 hover:text-rose-400 p-2 transition-colors self-center"><Trash2Icon size={18}/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* MANUAL EDIT FORM */}
                            <div className="glass-card p-6 rounded-3xl shadow-md border border-white/60">
                                <div className="flex justify-between items-center mb-6 pb-2 border-b border-gray-100">
                                    <h3 className="font-bold text-slate-700 text-lg">Edit Detail Teks</h3>
                                    <button onClick={resetForm} className="text-xs bg-rose-100 text-rose-600 px-3 py-1 rounded-full hover:bg-rose-200 font-semibold transition-colors">Reset Data</button>
                                </div>

                                {/* CAPTION SHOPEE VIDEO - DIPISAH DI SINI */}
                                <div className="mb-8 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-sm font-bold text-blue-600 uppercase tracking-wide flex items-center gap-2">
                                            <VideoIcon size={16}/> 
                                            Caption Shopee Video
                                        </span>
                                        <span className={`text-xs ${videoCaption.length > 150 ? 'text-red-500 font-bold' : 'text-slate-400'}`}>
                                            {videoCaption.length}/150
                                        </span>
                                    </div>
                                    <textarea 
                                        value={videoCaption} 
                                        onChange={(e) => setVideoCaption(e.target.value)}
                                        placeholder="Caption otomatis akan muncul di sini... #hashtag"
                                        rows="3"
                                        maxLength="160" 
                                        className="input-pastel p-3 rounded-xl text-sm w-full resize-none font-medium text-slate-700"
                                    />
                                    {videoCaption.length > 150 && <p className="text-xs text-red-500 mt-1">*Caption melebihi 150 karakter!</p>}
                                </div>

                                {[
                                    { title: '1. Identitas Produk', state: identities, setter: setIdentities, color: 'purple' },
                                    { title: '2. Spesifikasi Teknis', state: specs, setter: setSpecs, color: 'blue' },
                                    { title: '3. Informasi Kemasan', state: packaging, setter: setPackaging, color: 'emerald' },
                                    { title: '4. Kegunaan Utama', state: usages, setter: setUsages, color: 'orange' }
                                ].map((section, idx) => (
                                    <div key={idx} className="mb-8">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className={`text-sm font-bold text-${section.color}-600 uppercase tracking-wide`}>{section.title}</span>
                                            <button onClick={() => addItem(section.setter, section.state, { title: '', desc: '', label: '', value: '' })} className={`bg-${section.color}-100 text-${section.color}-600 w-8 h-8 rounded-full flex items-center justify-center hover:bg-${section.color}-200 transition-colors`}><PlusIcon size={18}/></button>
                                        </div>
                                        <div className="space-y-3">
                                            {section.state.map((item, i) => (
                                                <div key={i} className="flex gap-2 group items-start">
                                                    {item.label !== undefined ? (
                                                        <>
                                                            <input value={item.label} onChange={(e)=>updateItem(section.setter, section.state, i, 'label', e.target.value)} placeholder="Label" className="input-pastel p-2 rounded-xl text-sm w-1/3 font-semibold text-slate-600" />
                                                            <input value={item.value} onChange={(e)=>updateItem(section.setter, section.state, i, 'value', e.target.value)} placeholder="Isi Data..." className="input-pastel p-2 rounded-xl text-sm w-full" />
                                                        </>
                                                    ) : (
                                                        <>
                                                            <input value={item.title} onChange={(e)=>updateItem(section.setter, section.state, i, 'title', e.target.value)} placeholder="Fitur" className="input-pastel p-2 rounded-xl text-sm w-1/3 font-semibold text-slate-600" />
                                                            <textarea value={item.desc} onChange={(e)=>updateItem(section.setter, section.state, i, 'desc', e.target.value)} placeholder="Penjelasan..." rows="2" className="input-pastel p-2 rounded-xl text-sm w-full resize-none" />
                                                        </>
                                                    )}
                                                    <button onClick={()=>removeItem(section.setter, section.state, i)} className="text-slate-300 hover:text-rose-400 p-2 transition-colors"><Trash2Icon size={18}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* RIGHT COLUMN: PREVIEW */}
                        <div className="flex flex-col gap-6 sticky top-8">
                            
                            {/* TEXT RESULT */}
                            <div className="bg-gray-900 text-gray-100 p-0 rounded-3xl shadow-2xl border border-gray-700 flex flex-col overflow-hidden" style={{maxHeight: 'calc(100vh - 40px)'}}>
                                <div className="flex justify-between items-center p-5 bg-gray-800 border-b border-gray-700">
                                    <h2 className="text-lg font-bold flex items-center gap-2 text-white">
                                        <FileTextIcon size={20} className="text-purple-400"/>
                                        Preview Hasil
                                    </h2>
                                    <button 
                                        onClick={copyToClipboard}
                                        className={`flex items-center px-5 py-2 rounded-xl font-bold transition-all text-sm transform hover:scale-105 ${
                                            copied ? 'bg-emerald-500 text-white' : 'bg-indigo-500 hover:bg-indigo-600 text-white shadow-lg shadow-indigo-500/30'
                                        }`}
                                    >
                                        {copied ? <><CheckCircleIcon size={18} className="mr-2"/> Tersalin!</> : <><CopyIcon size={18} className="mr-2"/> Salin Teks</>}
                                    </button>
                                </div>
                                
                                <div className="font-mono text-sm leading-relaxed whitespace-pre-wrap p-6 flex-grow overflow-y-auto custom-scrollbar bg-gray-900 text-gray-300">
                                    {generatedText || <div className="h-64 flex items-center justify-center text-gray-600 italic">✨ Hasil Deskripsi muncul di sini...</div>}
                                </div>
                                <div className="p-3 bg-gray-800 text-center text-xs text-gray-500 border-t border-gray-700">
                                    Siap dicopy ke Tokopedia, Shopee, atau TikTok Shop
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
